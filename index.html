<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>UNILUX – Otimizador de Corte 1D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-box">U</div>
      <div>
        <div class="logo-name">UNILUX</div>
        <div class="logo-ver">Corte 1D · v1.0</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <span class="nav-section-label">Produção</span>

      <a href="#" class="nav-item active" id="nav-dashboard" data-route="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </a>

      <a href="#" class="nav-item" id="nav-ordens" data-route="ordens">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/>
        </svg>
        Ordens de Produção
        <span class="nav-badge" id="badge-ordens">0</span>
      </a>

      <a href="#" class="nav-item" id="nav-otimizador" data-route="otimizador">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Otimizador
        <span class="pro-chip">PRO</span>
      </a>

      <a href="#" class="nav-item" id="nav-planos" data-route="planos">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="4" height="20" rx="1"/><rect x="9" y="2" width="4" height="14" rx="1"/>
          <rect x="16" y="2" width="6" height="17" rx="1"/>
        </svg>
        Planos de Corte
      </a>

      <span class="nav-section-label">Estoque</span>

      <a href="#" class="nav-item" id="nav-barras" data-route="barras">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="9" width="20" height="6" rx="2"/>
        </svg>
        Barras
      </a>

      <a href="#" class="nav-item" id="nav-sobras" data-route="sobras">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
        </svg>
        Sobras
        <span class="nav-badge nav-badge-blue" id="badge-sobras">0</span>
      </a>

      <a href="#" class="nav-item" id="nav-skus" data-route="skus">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
          <circle cx="7" cy="7" r="1.5" fill="currentColor"/>
        </svg>
        Catálogo SKUs
      </a>

      <span class="nav-section-label">Sistema</span>

      <a href="#" class="nav-item" id="nav-configuracoes" data-route="configuracoes">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        Configurações
      </a>
    </nav>

    <div class="sidebar-footer">
      <span class="dot"></span>Produção · Supabase<br>
      <span style="margin-left:12px;">MaxRects BSSF</span>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrapper">
    <main class="content-area" id="contentArea"></main>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- SUPABASE (BaaS) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="db.js"></script>
<script src="modules/dashboard.js"></script>
<script src="modules/ordens.js"></script>
<script src="modules/otimizador.js"></script>
<script src="modules/planos.js"></script>
<script src="modules/barras.js"></script>
<script src="modules/sobras.js"></script>
<script src="modules/skus.js"></script>
<script src="modules/configuracoes.js"></script>
<script src="app.js"></script>
</body>
</html>
