<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Otimizador 1D – Gestão de Cortes Industriais</title>
  <meta name="description" content="Sistema de gestão e otimização de corte unidimensional para perfis industriais. Controle de estoque, ordens de produção e planos de corte." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-shell">

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M3 12h18M3 6h18M3 18h12"/>
              <line x1="19" y1="16" x2="21" y2="20"/><line x1="17" y1="20" x2="21" y2="20"/>
            </svg>
          </div>
          <div class="logo-text">
            <span class="logo-title">Otimizador</span>
            <span class="logo-sub">1D Cutting System</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-section-label">Produção</span>
          <a href="#" class="nav-item active" data-route="dashboard" id="nav-dashboard">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
            </svg>
            <span>Dashboard</span>
          </a>
          <a href="#" class="nav-item" data-route="ordens" id="nav-ordens">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
              <rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/>
              <line x1="9" y1="16" x2="13" y2="16"/>
            </svg>
            <span>Ordens de Produção</span>
            <span class="badge badge-warning" id="badge-ordens">5</span>
          </a>
          <a href="#" class="nav-item" data-route="otimizador" id="nav-otimizador">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <span>Otimizador</span>
          </a>
          <a href="#" class="nav-item" data-route="planos" id="nav-planos">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/>
              <rect x="17" y="3" width="5" height="15" rx="1"/>
            </svg>
            <span>Planos de Corte</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-label">Estoque</span>
          <a href="#" class="nav-item" data-route="barras" id="nav-barras">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="9" width="20" height="6" rx="2"/><path d="M6 9V5a1 1 0 011-1h10a1 1 0 011 1v4"/>
            </svg>
            <span>Barras</span>
          </a>
          <a href="#" class="nav-item" data-route="sobras" id="nav-sobras">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
            </svg>
            <span>Sobras</span>
            <span class="badge badge-info" id="badge-sobras">12</span>
          </a>
          <a href="#" class="nav-item" data-route="skus" id="nav-skus">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
              <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
            <span>Catálogo SKUs</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-label">Sistema</span>
          <a href="#" class="nav-item" data-route="configuracoes" id="nav-configuracoes">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
            <span>Configurações</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar">PCP</div>
          <div class="user-info">
            <span class="user-name">Usuário PCP</span>
            <span class="user-role">Administrador</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div class="breadcrumb" id="breadcrumb">
            <span>Produção</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            <span class="breadcrumb-current">Dashboard</span>
          </div>
        </div>
        <div class="topbar-right">
          <div class="topbar-date" id="topbarDate"></div>
          <div class="notification-btn" title="Notificações">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span class="notif-dot"></span>
          </div>
        </div>
      </header>

      <main class="content-area" id="contentArea">
        <!-- Rendered by router -->
      </main>
    </div>

  </div>

  <!-- ========== MODAL OVERLAY ========== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Modal</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="app.js"></script>
  <script src="modules/dashboard.js"></script>
  <script src="modules/ordens.js"></script>
  <script src="modules/otimizador.js"></script>
  <script src="modules/planos.js"></script>
  <script src="modules/barras.js"></script>
  <script src="modules/sobras.js"></script>
  <script src="modules/skus.js"></script>
  <script src="modules/configuracoes.js"></script>
</body>
</html>
