name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate static site
        shell: bash
        run: |
          set -euo pipefail

          test -s index.html
          test -s modules/optimization-worker.js
          test -s vendor/supabase-js-2.108.2.min.js
          test -s vendor/xlsx-0.20.3.full.min.js

          grep -q 'vendor/supabase-js-2.108.2.min.js' index.html
          grep -q 'vendor/xlsx-0.20.3.full.min.js' index.html
          grep -q 'modules/optimization-worker.js' modules/otimizador.js

          if grep -Eq 'cdn\.jsdelivr|cdn\.sheetjs' index.html; then
            echo "Critical browser libraries must be served locally from vendor/."
            exit 1
          fi

          for file in app.js db.js modules/*.js vendor/*.js; do
            node --check "$file"
          done
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify deployed site
        shell: bash
        run: |
          set -euo pipefail

          page_url="${{ steps.deployment.outputs.page_url }}"
          page_url="${page_url%/}/"
          for path in "" "vendor/supabase-js-2.108.2.min.js" "vendor/xlsx-0.20.3.full.min.js"; do
            curl --fail --location --retry 6 --retry-delay 10 --retry-all-errors \
              "${page_url}${path}" >/dev/null
          done

          curl --fail --location --retry 6 --retry-delay 10 --retry-all-errors \
            "${page_url}" | grep -q 'vendor/supabase-js-2.108.2.min.js'
