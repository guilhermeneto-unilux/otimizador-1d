name: Deploy static content to Pages

# Sistema migrado para os Otimizadores Unilux (19/07/2026).
# Este workflow publica apenas o aviso de migracao; o aplicativo antigo
# permanece no repositorio somente como historico (rollback: git revert).

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate migration notice
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          grep -q 'Este sistema foi migrado' index.html
          grep -q 'otimizadores-unilux.netlify.app' index.html
      - name: Prepare artifact (only the migration notice)
        shell: bash
        run: |
          mkdir -p _site
          cp index.html _site/
          cp favicon.svg _site/ 2>/dev/null || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify deployed site
        shell: bash
        run: |
          set -euo pipefail
          page_url="${{ steps.deployment.outputs.page_url }}"
          page_url="${page_url%/}/"
          curl --fail --location --retry 6 --retry-delay 10 --retry-all-errors \
            "${page_url}" | grep -q 'Este sistema foi migrado'
